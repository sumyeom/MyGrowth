spring.application.name=MyGrowth

spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# create, update, none, creat-drop
spring.jpa.database=mysql
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

spring.jwt.secret=${JWT_SECRET}

# Jwt Token
jwt.access-token.expiration=3600000
jwt.refresh-token.expiration=604800000

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=6379

# GEMINI
gemini.api.url=https://gemini.googleapis.com/v1/projects/PROJECT_ID/locations/us-central1/publishers/google/models/gemini-1.5-flash:predict
gemini.api.key=${GEMINI_KEY}

server.port = 8081
